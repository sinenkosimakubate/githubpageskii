<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Coffee — Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Page hero banner ── */
        .page-banner {
            height: 420px;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding-bottom: 60px;
        }
        .page-banner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(28,18,13,0.3) 0%, rgba(28,18,13,0.85) 100%);
        }
        .page-banner .banner-content {
            position: relative;
            z-index: 2;
        }
        .page-banner h1 {
            color: #e5c08b;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin: 0;
        }
        .page-banner p {
            color: #c9a87a;
            margin: 8px 0 0;
            font-size: 1.05rem;
        }

        /* ── Sticky controls bar ── */
        .controls-bar {
            background: #1c120d;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 360px;
        }
        .search-wrap input {
            background: #2b1b14;
            border: 1px solid rgba(229,192,139,0.25);
            color: #f5e6d3;
            border-radius: 8px;
            padding: 10px 16px 10px 40px;
            width: 100%;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input::placeholder { color: #8a6a52; }
        .search-wrap input:focus { border-color: #e5c08b; }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a6a52;
            font-size: 0.9rem;
        }

        /* ── Category pills ── */
        .cat-pills {
            display: flex;
            gap: 10px;
        }
        .cat-pill {
            background: transparent;
            border: 1px solid rgba(229,192,139,0.3);
            color: #c9a87a;
            padding: 8px 22px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .cat-pill:hover {
            border-color: #e5c08b;
            color: #e5c08b;
        }
        .cat-pill.active {
            background: #e5c08b;
            border-color: #e5c08b;
            color: #1c120d;
        }

        /* ── Section label ── */
        .section-eyebrow {
            color: #8a6a52;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .section-title {
            color: #e5c08b;
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 36px;
        }

        /* ── Menu cards ── */
        .menu-card {
            background: #3b241b;
            border: 1px solid rgba(229,192,139,0.08);
            border-radius: 14px;
            overflow: hidden;
            transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s;
        }
        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: rgba(229,192,139,0.3);
        }
        .menu-card img {
            height: 220px;
            width: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .menu-card:hover img { transform: scale(1.07); }
        .card-inner {
            padding: 20px 22px 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .card-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: #f5e6d3;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.875rem;
            color: #9a7055;
            line-height: 1.6;
            flex: 1;
            margin-bottom: 18px;
        }
        .card-footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price-tag {
            background: rgba(229,192,139,0.15);
            color: #e5c08b;
            padding: 5px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .add-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .qty-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(229,192,139,0.3);
            background: transparent;
            color: #e5c08b;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            line-height: 1;
        }
        .qty-btn:hover { background: rgba(229,192,139,0.1); }
        .qty-display {
            color: #f5e6d3;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
            font-size: 0.9rem;
        }
        .add-btn {
            background: #e5c08b;
            color: #1c120d;
            border: none;
            border-radius: 6px;
            padding: 6px 16px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .add-btn:hover {
            background: #d4ad77;
            transform: translateY(-1px);
        }

        /* ── Popular badge ── */
        .popular-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #d9534f;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 50px;
            z-index: 2;
            letter-spacing: 0.5px;
        }

        /* ── No results ── */
        #no-results {
            display: none;
            text-align: center;
            padding: 80px 20px;
            color: #8a6a52;
        }
        #no-results h3 { color: #e5c08b; margin-bottom: 10px; }

        /* ── Toast ── */
        #cart-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #e5c08b;
            color: #1c120d;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- Standard solid header for inner pages -->
<header>
    <a href="index.html" class="site-logo">Süpreme Cöffee</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html" class="cart-link">
            Order Now
            <span id="cart-badge"></span>
        </a>
    </nav>
</header>

<!-- Page hero — swaps image per category via JS -->
<div class="page-banner" id="pageBanner">
    <div class="container banner-content">
        <p class="section-eyebrow">Supreme Coffee</p>
        <h1 id="bannerTitle">Our Menu</h1>
        <p id="bannerSubtitle">Handcrafted drinks, fresh pastries &amp; hearty meals</p>
    </div>
</div>

<!-- Sticky controls bar -->
<div class="controls-bar">
    <div class="container d-flex align-items-center gap-4 flex-wrap">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search menu…" oninput="filterMenu()">
        </div>
        <div class="cat-pills">
            <a class="cat-pill active" data-category="drinks">☕ Drinks</a>
            <a class="cat-pill" data-category="pastries">🥐 Pastries</a>
            <a class="cat-pill" data-category="meals">🍳 Meals</a>
        </div>
    </div>
</div>

<!-- Menu grid -->
<div style="background:#2b1b14; min-height:60vh; padding: 60px 0 80px;">
    <div class="container">
        <div id="menuContainer">
            <div class="row row-cols-1 row-cols-md-3 g-4" id="drinks-grid"></div>
        </div>
        <div id="no-results">
            <h3>No items match "<span id="search-term"></span>"</h3>
            <p>Try a different word or browse a category above.</p>
        </div>
    </div>
</div>

<div id="cart-toast"></div>

<footer>
    <p>© Supreme Coffee 2026 • All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const menuData = {
    drinks: [
        {name:"Cappuccino",price:"P42.90",desc:"Espresso with steamed milk and thick foam",img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93",popular:true},
        {name:"Flat White",price:"P25.90",desc:"Rich espresso with velvety microfoam",img:"flatwhite.jpg",popular:true},
        {name:"Caramel Latte",price:"P35.90",desc:"Smooth espresso with caramel syrup",img:"https://images.unsplash.com/photo-1461023058943-07fcbe16d735",popular:false},
        {name:"Mocha",price:"P38.90",desc:"Espresso, chocolate & steamed milk",img:"https://images.unsplash.com/photo-1541167760496-1628856ab772",popular:false},
        {name:"Espresso",price:"P15.90",desc:"Bold and intense single shot",img:"https://images.unsplash.com/photo-1511920170033-f8396924c348",popular:false},
        {name:"Iced Americano",price:"P28.90",desc:"Chilled espresso over ice",img:"icedamericano.jpg",popular:false}
    ],
    pastries: [
        {name:"Butter Croissant",price:"P18.90",desc:"Flaky golden French pastry",img:"buttercroissant.jpg",popular:true},
        {name:"Chocolate Muffin",price:"P22.90",desc:"Rich dark chocolate chips",img:"chocolatemuffin.jpg",popular:false},
        {name:"Cinnamon Roll",price:"P26.90",desc:"Warm gooey with cream cheese icing",img:"cinammonroll.jpg",popular:true},
        {name:"Almond Croissant",price:"P29.90",desc:"Filled with sweet almond paste",img:"almondcroissant.jpg",popular:false},
        {name:"Blueberry Scone",price:"P24.90",desc:"Buttery with fresh blueberries",img:"blueberryscone.jpg",popular:false},
        {name:"Cheese Danish",price:"P23.90",desc:"Creamy cheese filling",img:"cheesedanish.jpg",popular:false},
        {name:"Banana Bread",price:"P19.90",desc:"Moist homemade with walnuts",img:"bananabread.jpg",popular:false},
        {name:"Lemon Poppy Seed Muffin",price:"P21.90",desc:"Zesty and refreshing",img:"lemonpoppyseedmuffin.jpg",popular:false}
    ],
    meals: [
        {name:"Avocado Toast",price:"P45.90",desc:"Smashed avocado, poached egg & chili flakes",img:"avocadotoast.jpg",popular:true},
        {name:"Breakfast Sandwich",price:"P52.90",desc:"Egg, bacon, cheese on sourdough",img:"breakfastsandwich.jpeg",popular:false},
        {name:"Chicken Pesto Panini",price:"P58.90",desc:"Grilled chicken, pesto & mozzarella",img:"chickenpestopanini.jpg",popular:true},
        {name:"Granola Bowl",price:"P38.90",desc:"Greek yogurt, fresh fruits & honey",img:"granolabowl.jpg",popular:false},
        {name:"Smoked Salmon Bagel",price:"P55.90",desc:"Cream cheese, capers & red onion",img:"smokedsalmonbagel.jpg",popular:false},
        {name:"Quiche Lorraine",price:"P48.90",desc:"Classic ham, cheese & herbs",img:"quichelorraine.jpeg",popular:false}
    ]
};

const bannerConfig = {
    drinks: {
        img: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=2000&q=80',
        title: 'Drinks',
        sub: 'From bold espressos to velvety lattes'
    },
    pastries: {
        img: 'french-pastries-breakfast.jpg',
        title: 'Pastries',
        sub: 'Baked fresh every morning'
    },
    meals: {
        img: 'egg-week-2024-1140x518.jpg',
        title: 'Meals',
        sub: 'Hearty bites to fuel your day'
    }
};

const quantities = {};
let activeCategory = 'drinks';
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function setBanner(category) {
    const cfg = bannerConfig[category];
    const banner = document.getElementById('pageBanner');
    banner.style.backgroundImage = `url('${cfg.img}')`;
    banner.style.backgroundSize = 'cover';
    banner.style.backgroundPosition = 'center';
    document.getElementById('bannerTitle').textContent = cfg.title;
    document.getElementById('bannerSubtitle').textContent = cfg.sub;
}

function renderCategory(category) {
    activeCategory = category;
    document.getElementById('searchInput').value = '';
    document.getElementById('no-results').style.display = 'none';
    setBanner(category);
    const container = document.getElementById('menuContainer');
    container.innerHTML = `<div class="row row-cols-1 row-cols-md-3 g-4" id="${category}-grid"></div>`;
    renderItems(menuData[category], category);
}

function renderItems(items, gridId) {
    const grid = document.getElementById(`${gridId}-grid`);
    if (!grid) return;
    grid.innerHTML = '';
    items.forEach(item => {
        if (!quantities[item.name]) quantities[item.name] = 1;
        const safeId = item.name.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
        grid.innerHTML += `
            <div class="col">
                <div class="menu-card d-flex flex-column h-100 position-relative">
                    ${item.popular ? '<span class="popular-badge">⭐ Popular</span>' : ''}
                    <div style="overflow:hidden;">
                        <img src="${item.img}" alt="${item.name}">
                    </div>
                    <div class="card-inner">
                        <div class="card-name">${item.name}</div>
                        <div class="card-desc">${item.desc}</div>
                        <div class="card-footer-row">
                            <span class="price-tag">${item.price}</span>
                            <div class="add-controls">
                                <button class="qty-btn" onclick="changeQty('${item.name}', -1)">−</button>
                                <span class="qty-display" id="qty-${safeId}">${quantities[item.name]}</span>
                                <button class="qty-btn" onclick="changeQty('${item.name}', 1)">+</button>
                                <button class="add-btn" onclick="addToCart('${item.name}', '${item.price}')">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
    });
}

function changeQty(name, delta) {
    if (!quantities[name]) quantities[name] = 1;
    quantities[name] = Math.max(1, quantities[name] + delta);
    const safeId = name.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
    const el = document.getElementById('qty-' + safeId);
    if (el) el.textContent = quantities[name];
}

function filterMenu() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const noResults = document.getElementById('no-results');
    document.getElementById('search-term').textContent = query;

    if (!query) { renderCategory(activeCategory); return; }

    let results = [];
    Object.keys(menuData).forEach(cat => {
        menuData[cat].forEach(item => {
            if (item.name.toLowerCase().includes(query) || item.desc.toLowerCase().includes(query)) {
                results.push(item);
            }
        });
    });

    if (results.length === 0) {
        document.getElementById('menuContainer').innerHTML = '';
        noResults.style.display = 'block';
        return;
    }
    noResults.style.display = 'none';
    document.getElementById('menuContainer').innerHTML = '<div class="row row-cols-1 row-cols-md-3 g-4" id="search-grid"></div>';
    renderItems(results, 'search');
}

function addToCart(name, price) {
    const qty = quantities[name] || 1;
    for (let i = 0; i < qty; i++) cart.push({name, price});
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();
    showToast(`✅ ${qty > 1 ? qty + '× ' : ''}${name} added`);
}

function showToast(msg) {
    const t = document.getElementById('cart-toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._t);
    t._t = setTimeout(() => t.style.opacity = '0', 2500);
}

function updateCartBadge() {
    const badge = document.getElementById('cart-badge');
    if (cart.length > 0) { badge.textContent = cart.length; badge.style.display = 'inline'; }
    else { badge.style.display = 'none'; }
}

// Tab pills
document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        renderCategory(pill.dataset.category);
    });
});

window.addToCart = addToCart;
window.changeQty = changeQty;

renderCategory('drinks');
updateCartBadge();
</script>
</body>
</html>
