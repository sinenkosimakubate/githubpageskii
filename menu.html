<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Coffee - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-hero {
            height: 380px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.7);
            margin-bottom: 40px;
            border-radius: 12px;
            position: relative;
        }
        .menu-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(28,18,13,0.5), rgba(28,18,13,0.65));
            border-radius: 12px;
        }
        .menu-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            background: #3b241b;
            border: none;
        }
        .menu-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgba(229, 192, 139, 0.4);
        }
        .menu-card img {
            transition: transform 0.6s ease;
            height: 260px;
            object-fit: cover;
        }
        .menu-card:hover img {
            transform: scale(1.12);
        }
        .price-tag {
            background: #e5c08b;
            color: #1c120d;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: bold;
        }
        .popular-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #d9534f;
            color: white;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 2;
        }
        /* Quantity controls */
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #1c120d;
            color: #e5c08b;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .qty-btn:hover { background: #2b1b14; }
        .qty-display {
            color: #f5e6d3;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        /* No results */
        #no-results {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #e5c08b;
        }
    </style>
</head>
<body>

<header>
    <h1>Supreme Coffee</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html" class="cart-link">
            Order Now
            <span id="cart-badge"></span>
        </a>
    </nav>
</header>

<div class="container py-5">
    <h1 class="text-center display-4 mb-5" style="color:#e5c08b;">Our Menu</h1>

    <div class="mb-4">
        <input type="text" id="searchInput" class="form-control form-control-lg"
               placeholder="Search menu..." oninput="filterMenu()">
    </div>

    <ul class="nav nav-tabs justify-content-center mb-5" id="menuTabs">
        <li class="nav-item"><a class="nav-link active category-tab" data-category="drinks">☕ Drinks</a></li>
        <li class="nav-item"><a class="nav-link category-tab" data-category="pastries">🥐 Pastries</a></li>
        <li class="nav-item"><a class="nav-link category-tab" data-category="meals">🍳 Meals</a></li>
    </ul>

    <div id="menuContainer"></div>
    <div id="no-results">
        <h3>No items found for "<span id="search-term"></span>"</h3>
        <p>Try a different search term.</p>
    </div>
</div>

<footer>
    <p>© Supreme Coffee 2026 • All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const menuData = {
    drinks: [
        {name: "Cappuccino", price: "P42.90", desc: "Espresso with steamed milk and thick foam", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93", popular: true},
        {name: "Flat White", price: "P25.90", desc: "Rich espresso with velvety microfoam", img: "flatwhite.jpg", popular: true},
        {name: "Caramel Latte", price: "P35.90", desc: "Smooth espresso with caramel syrup", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735", popular: false},
        {name: "Mocha", price: "P38.90", desc: "Espresso, chocolate & steamed milk", img: "https://images.unsplash.com/photo-1541167760496-1628856ab772", popular: false},
        {name: "Espresso", price: "P15.90", desc: "Bold and intense single shot", img: "https://images.unsplash.com/photo-1511920170033-f8396924c348", popular: false},
        {name: "Iced Americano", price: "P28.90", desc: "Chilled espresso over ice", img: "icedamericano.jpg", popular: false}
    ],
    pastries: [
        {name: "Butter Croissant", price: "P18.90", desc: "Flaky golden French pastry", img: "buttercroissant.jpg", popular: true},
        {name: "Chocolate Muffin", price: "P22.90", desc: "Rich dark chocolate chips", img: "chocolatemuffin.jpg", popular: false},
        {name: "Cinnamon Roll", price: "P26.90", desc: "Warm gooey with cream cheese icing", img: "cinammonroll.jpg", popular: true},
        {name: "Almond Croissant", price: "P29.90", desc: "Filled with sweet almond paste", img: "almondcroissant.jpg", popular: false},
        {name: "Blueberry Scone", price: "P24.90", desc: "Buttery with fresh blueberries", img: "blueberryscone.jpg", popular: false},
        {name: "Cheese Danish", price: "P23.90", desc: "Creamy cheese filling", img: "cheesedanish.jpg", popular: false},
        {name: "Banana Bread", price: "P19.90", desc: "Moist homemade with walnuts", img: "bananabread.jpg", popular: false},
        {name: "Lemon Poppy Seed Muffin", price: "P21.90", desc: "Zesty and refreshing", img: "lemonpoppyseedmuffin.jpg", popular: false}
    ],
    meals: [
        {name: "Avocado Toast", price: "P45.90", desc: "Smashed avocado, poached egg & chili flakes", img: "avocadotoast.jpg", popular: true},
        {name: "Breakfast Sandwich", price: "P52.90", desc: "Egg, bacon, cheese on sourdough", img: "breakfastsandwich.jpeg", popular: false},
        {name: "Chicken Pesto Panini", price: "P58.90", desc: "Grilled chicken, pesto & mozzarella", img: "chickenpestopanini.jpg", popular: true},
        {name: "Granola Bowl", price: "P38.90", desc: "Greek yogurt, fresh fruits & honey", img: "granolabowl.jpg", popular: false},
        {name: "Smoked Salmon Bagel", price: "P55.90", desc: "Cream cheese, capers & red onion", img: "smokedsalmonbagel.jpg", popular: false},
        {name: "Quiche Lorraine", price: "P48.90", desc: "Classic ham, cheese & herbs", img: "quichelorraine.jpeg", popular: false}
    ]
};

// Quantities per item (reset on page load)
const quantities = {};

let activeCategory = 'drinks';

function getHeroImage(category) {
    if (category === 'drinks') return 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085';
    if (category === 'pastries') return 'french-pastries-breakfast.jpg';
    if (category === 'meals') return 'egg-week-2024-1140x518.jpg';
}

function renderCategory(category) {
    activeCategory = category;
    document.getElementById('searchInput').value = '';
    document.getElementById('no-results').style.display = 'none';

    const container = document.getElementById('menuContainer');
    container.innerHTML = `
        <div class="menu-hero" style="background-image: url('${getHeroImage(category)}')">
            <h2 style="z-index:2">${category.charAt(0).toUpperCase() + category.slice(1)}</h2>
        </div>
        <div class="row row-cols-1 row-cols-md-3 g-4" id="${category}-grid"></div>
    `;
    renderItems(menuData[category], category);
}

function renderItems(items, category) {
    const grid = document.getElementById(`${category}-grid`);
    grid.innerHTML = '';
    items.forEach(item => {
        const key = item.name;
        if (!quantities[key]) quantities[key] = 1;
        grid.innerHTML += `
            <div class="col">
                <div class="card menu-card h-100 text-light position-relative">
                    ${item.popular ? '<span class="popular-badge">Popular</span>' : ''}
                    <img src="${item.img}" class="card-img-top" alt="${item.name}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${item.name}</h5>
                        <p class="card-text flex-grow-1">${item.desc}</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="price-tag fs-5">${item.price}</span>
                            <div class="d-flex align-items-center gap-2">
                                <div class="qty-controls">
                                    <button class="qty-btn" onclick="changeQty('${key}', -1)">−</button>
                                    <span class="qty-display" id="qty-${key.replace(/\s/g,'-')}">${quantities[key]}</span>
                                    <button class="qty-btn" onclick="changeQty('${key}', 1)">+</button>
                                </div>
                                <button onclick="addToCart('${item.name}', '${item.price}')"
                                        class="btn btn-sm px-3" style="background:#e5c08b; color:#1c120d; font-weight:bold;">
                                    Add
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
    });
}

function changeQty(name, delta) {
    const key = name;
    if (!quantities[key]) quantities[key] = 1;
    quantities[key] = Math.max(1, quantities[key] + delta);
    const el = document.getElementById('qty-' + key.replace(/\s/g, '-'));
    if (el) el.textContent = quantities[key];
}

function filterMenu() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    document.getElementById('search-term').textContent = query;

    if (!query) {
        renderCategory(activeCategory);
        return;
    }

    // Search across ALL categories
    let allResults = [];
    Object.keys(menuData).forEach(cat => {
        menuData[cat].forEach(item => {
            if (item.name.toLowerCase().includes(query) || item.desc.toLowerCase().includes(query)) {
                allResults.push({...item, _cat: cat});
            }
        });
    });

    const container = document.getElementById('menuContainer');
    const noResults = document.getElementById('no-results');

    if (allResults.length === 0) {
        container.innerHTML = '';
        noResults.style.display = 'block';
        return;
    }

    noResults.style.display = 'none';
    container.innerHTML = `<div class="row row-cols-1 row-cols-md-3 g-4" id="search-grid"></div>`;
    renderItems(allResults, 'search');
}

// Tab functionality
document.querySelectorAll('.category-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCategory(tab.dataset.category);
    });
});

// Cart
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function addToCart(name, price) {
    const qty = quantities[name] || 1;
    for (let i = 0; i < qty; i++) {
        cart.push({name, price});
    }
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartBadge();

    // Toast notification
    showToast(`✅ ${qty > 1 ? qty + 'x ' : ''}${name} added!`);
}

function showToast(msg) {
    let toast = document.getElementById('cart-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'cart-toast';
        toast.style.cssText = `
            position:fixed; bottom:30px; right:30px; background:#e5c08b; color:#1c120d;
            padding:12px 24px; border-radius:8px; font-weight:bold; z-index:9999;
            box-shadow:0 4px 15px rgba(0,0,0,0.3); transition:opacity 0.4s;
        `;
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._timeout);
    toast._timeout = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

function updateCartBadge() {
    const badge = document.getElementById('cart-badge');
    if (cart.length > 0) {
        badge.textContent = cart.length;
        badge.style.display = 'inline';
    } else {
        badge.style.display = 'none';
    }
}

window.addToCart = addToCart;
window.changeQty = changeQty;

// Initial load
renderCategory('drinks');
updateCartBadge();
</script>
</body>
</html>
