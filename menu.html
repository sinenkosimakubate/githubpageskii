<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Coffee - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-hero {
            height: 380px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 3px 10px rgba(0,0,0,0.7);
            margin-bottom: 40px;
            border-radius: 12px;
            position: relative;
        }
        .menu-hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(28,18,13,0.45), rgba(28,18,13,0.65));
            border-radius: 12px;
        }
        .menu-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            background: #3b241b;
            border: none;
        }
        .menu-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgba(229, 192, 139, 0.4);
        }
        .menu-card img {
            transition: transform 0.6s ease;
        }
        .menu-card:hover img {
            transform: scale(1.15);
        }
        .price-tag {
            background: #e5c08b;
            color: #1c120d;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: bold;
        }
        .popular-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #d9534f;
            color: white;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            z-index: 2;
        }
    </style>
</head>
<body>

<header>
    <h1>Supreme Coffee</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Order Now</a>
    </nav>
</header>

<div class="container py-5">
    <h1 class="text-center display-4 mb-5" style="color:#e5c08b;">Our Menu</h1>

    <div class="mb-4">
        <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search menu..." onkeyup="filterMenu()">
    </div>

    <ul class="nav nav-tabs justify-content-center mb-5" id="menuTabs">
        <li class="nav-item"><a class="nav-link active category-tab" data-category="drinks">☕ Drinks</a></li>
        <li class="nav-item"><a class="nav-link category-tab" data-category="pastries">🥐 Pastries</a></li>
        <li class="nav-item"><a class="nav-link category-tab" data-category="meals">🍳 Meals</a></li>
    </ul>

    <div id="menuContainer"></div>
</div>

<footer>
    <p>© Supreme Coffee 2026 • All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// FULL Menu Data
const menuData = {
    drinks: [
        {name: "Cappuccino", price: "P42.90", desc: "Espresso with steamed milk and thick foam", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80", popular: true},
        {name: "Flat White", price: "P25.90", desc: "Rich espresso with velvety microfoam", img: "https://images.unsplash.com/photo-1517953409833-6c2d3c3a5f6a?auto=format&fit=crop&w=800&q=80", popular: true},
        {name: "Caramel Latte", price: "P35.90", desc: "Smooth espresso with caramel syrup", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Mocha", price: "P38.90", desc: "Espresso, chocolate & steamed milk", img: "https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Espresso", price: "P15.90", desc: "Bold and intense single shot", img: "https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Iced Americano", price: "P28.90", desc: "Chilled espresso over ice", img: "https://images.unsplash.com/photo-1517701604599-bb29b5650906?auto=format&fit=crop&w=800&q=80", popular: false}
    ],
    pastries: [
        {name: "Butter Croissant", price: "P18.90", desc: "Flaky golden French pastry", img: "https://images.unsplash.com/photo-1555507036-4f7c8e5c6e4e?auto=format&fit=crop&w=800&q=80", popular: true},
        {name: "Chocolate Muffin", price: "P22.90", desc: "Rich dark chocolate chips", img: "https://images.unsplash.com/photo-1606313565693-7f3f7b3f3f3f?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Cinnamon Roll", price: "P26.90", desc: "Warm gooey with cream cheese icing", img: "https://images.unsplash.com/photo-1509365462397-8a3c2f5a5f5f?auto=format&fit=crop&w=800&q=80", popular: true},
        {name: "Almond Croissant", price: "P29.90", desc: "Filled with sweet almond paste", img: "https://images.unsplash.com/photo-1621996346565-e9a0f6f9e8f8?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Blueberry Scone", price: "P24.90", desc: "Buttery with fresh blueberries", img: "https://images.unsplash.com/photo-1562440499-4c3d7b8e2e3f?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Cheese Danish", price: "P23.90", desc: "Creamy cheese filling", img: "https://images.unsplash.com/photo-1549903072-9f6f2c9e8f8f?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Banana Bread", price: "P19.90", desc: "Moist homemade with walnuts", img: "https://images.unsplash.com/photo-1587241374279-8e5f8f8f8f8f?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Lemon Poppy Seed Muffin", price: "P21.90", desc: "Zesty and refreshing", img: "https://images.unsplash.com/photo-1599785207-8f8f8f8f8f8f?auto=format&fit=crop&w=800&q=80", popular: false}
    ],
    meals: [
        {name: "Avocado Toast", price: "P45.90", desc: "Smashed avocado, poached egg & chili flakes", img: "https://images.unsplash.com/photo-1541519227648-8b4f1c4f8f8f?auto=format&fit=crop&w=800&q=80", popular: true},
        {name: "Breakfast Sandwich", price: "P52.90", desc: "Egg, bacon, cheese on sourdough", img: "https://images.unsplash.com/photo-1551218808-0f8f8f8f8f8f?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Chicken Pesto Panini", price: "P58.90", desc: "Grilled chicken, pesto & mozzarella", img: "https://images.unsplash.com/photo-1509365462397-8a3c2f5a5f5f?auto=format&fit=crop&w=800&q=80", popular: true},
        {name: "Granola Bowl", price: "P38.90", desc: "Greek yogurt, fresh fruits & honey", img: "https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Smoked Salmon Bagel", price: "P55.90", desc: "Cream cheese, capers & red onion", img: "https://images.unsplash.com/photo-1606313565693-7f3f7b3f3f3f?auto=format&fit=crop&w=800&q=80", popular: false},
        {name: "Quiche Lorraine", price: "P48.90", desc: "Classic ham, cheese & herbs", img: "https://images.unsplash.com/photo-1621996346565-e9a0f6f9e8f8?auto=format&fit=crop&w=800&q=80", popular: false}
    ]
};

function renderCategory(category) {
    const container = document.getElementById('menuContainer');
    let heroImage = category === 'drinks' ? 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085' :
                    category === 'pastries' ? 'https://images.unsplash.com/photo-1555507036-4f7c8e5c6e4e' :
                    'https://images.unsplash.com/photo-1504753793650-d4e3c8e6c3e3';

    container.innerHTML = `
        <div class="menu-hero" style="background-image: url('${heroImage}?auto=format&fit=crop&w=2000&q=80')">
            <h2 style="z-index:2">${category.charAt(0).toUpperCase() + category.slice(1)}</h2>
        </div>
        <div class="row row-cols-1 row-cols-md-3 g-4" id="${category}-grid"></div>
    `;

    const grid = document.getElementById(`${category}-grid`);
    grid.innerHTML = '';   // Clear previous

    menuData[category].forEach(item => {
        const card = `
            <div class="col">
                <div class="card menu-card h-100 text-light position-relative">
                    ${item.popular ? '<span class="popular-badge">Popular</span>' : ''}
                    <img src="${item.img}" class="card-img-top" style="height: 260px; object-fit: cover;" alt="${item.name}">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title">${item.name}</h5>
                        <p class="card-text flex-grow-1">${item.desc}</p>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <span class="price-tag fs-5">${item.price}</span>
                            <button onclick="addToCart('${item.name}', '${item.price}')" 
                                    class="btn btn-sm px-4" style="background:#e5c08b; color:#1c120d; font-weight:bold;">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            </div>`;
        grid.innerHTML += card;
    });
}

// Tab Click
document.querySelectorAll('.category-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        renderCategory(tab.dataset.category);
    });
});

function filterMenu() {
    console.log("Searching...");
}

// Initial Load
renderCategory('drinks');

// Cart
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function addToCart(name, price) {
    cart.push({name, price});
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(`✅ ${name} added to cart!`);
}

window.addToCart = addToCart;
</script>
</body>
</html>
