<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supreme Coffee - Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-section { padding: 80px 20px; background: #2b1b14; }
        .coffee-card {
            transition: all 0.4s ease;
            height: 100%;
            background: #3b241b;
        }
        .coffee-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 35px rgba(229, 192, 139, 0.3) !important;
        }
        .price { color: #e5c08b; font-weight: bold; font-size: 1.35rem; }
        .add-to-cart {
            background: #e5c08b;
            color: #1c120d;
            font-weight: bold;
        }
        .nav-tabs .nav-link.active {
            background: #e5c08b;
            color: #1c120d;
        }
    </style>
</head>
<body>

<header>
    <h1>Supreme Coffee</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="contact.html">Order Now</a>
    </nav>
</header>

<div class="menu-section">
    <div class="container">
        <h2 class="text-center display-5 mb-5" style="color:#e5c08b;">Our Menu</h2>
        
        <ul class="nav nav-tabs justify-content-center mb-5" id="menuTabs">
            <li class="nav-item"><a class="nav-link active category-tab" data-category="drinks">Drinks</a></li>
            <li class="nav-item"><a class="nav-link category-tab" data-category="pastries">Pastries</a></li>
            <li class="nav-item"><a class="nav-link category-tab" data-category="meals">Meals</a></li>
        </ul>

        <!-- Drinks -->
        <div id="drinks" class="menu-category row g-4"></div>

        <!-- Pastries -->
        <div id="pastries" class="menu-category row g-4 d-none"></div>

        <!-- Meals -->
        <div id="meals" class="menu-category row g-4 d-none"></div>
    </div>
</div>

<footer>
    <p>© Supreme Coffee 2026 • All Rights Reserved</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Menu Data
const menuData = {
    drinks: [
        {name: "Flat White", price: "P25.90", desc: "Rich espresso with velvety microfoam", img: "https://images.unsplash.com/photo-1517953409833-6c2d3c3a5f6a?auto=format&fit=crop&w=800&q=80"},
        {name: "Cappuccino", price: "P42.90", desc: "Espresso, steamed milk & thick foam", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80"},
        {name: "Caramel Latte", price: "P35.90", desc: "Smooth espresso with caramel syrup", img: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=800&q=80"},
        {name: "Mocha", price: "P38.90", desc: "Espresso, chocolate & steamed milk", img: "https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=800&q=80"},
        {name: "Espresso", price: "P15.90", desc: "Bold and intense single shot", img: "https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=800&q=80"},
        {name: "Iced Americano", price: "P28.90", desc: "Chilled espresso over ice", img: "https://images.unsplash.com/photo-1517701604599-bb29b5650906?auto=format&fit=crop&w=800&q=80"}
    ],
    pastries: [
        {name: "Butter Croissant", price: "P18.90", desc: "Flaky golden French pastry", img: "https://images.unsplash.com/photo-1555507036-4f7c8e5c6e4e?auto=format&fit=crop&w=800&q=80"},
        {name: "Chocolate Muffin", price: "P22.90", desc: "Rich dark chocolate chips", img: "https://images.unsplash.com/photo-1606313565693-7f3f7b3f3f3f?auto=format&fit=crop&w=800&q=80"},
        {name: "Cinnamon Roll", price: "P26.90", desc: "Warm with cream cheese icing", img: "https://images.unsplash.com/photo-1509365462397-8a3c2f5a5f5f?auto=format&fit=crop&w=800&q=80"},
        {name: "Almond Croissant", price: "P29.90", desc: "Filled with sweet almond paste", img: "https://images.unsplash.com/photo-1621996346565-e9a0f6f9e8f8?auto=format&fit=crop&w=800&q=80"},
        {name: "Blueberry Scone", price: "P24.90", desc: "Buttery with fresh blueberries", img: "https://images.unsplash.com/photo-1562440499-4c3d7b8e2e3f?auto=format&fit=crop&w=800&q=80"},
        {name: "Cheese Danish", price: "P23.90", desc: "Creamy cheese filling", img: "https://images.unsplash.com/photo-1549903072-9f6f2c9e8f8f?auto=format&fit=crop&w=800&q=80"},
        {name: "Banana Bread", price: "P19.90", desc: "Moist with walnuts", img: "https://images.unsplash.com/photo-1587241374279-8e5f8f8f8f8f?auto=format&fit=crop&w=800&q=80"},
        {name: "Lemon Poppy Seed", price: "P21.90", desc: "Zesty and refreshing", img: "https://images.unsplash.com/photo-1599785207-8f8f8f8f8f8f?auto=format&fit=crop&w=800&q=80"}
    ],
    meals: [
        {name: "Avocado Toast", price: "P45.90", desc: "Smashed avocado, poached egg & chili", img: "https://images.unsplash.com/photo-1541519227648-8b4f1c4f8f8f?auto=format&fit=crop&w=800&q=80"},
        {name: "Breakfast Sandwich", price: "P52.90", desc: "Egg, bacon, cheese on sourdough", img: "https://images.unsplash.com/photo-1551218808-0f8f8f8f8f8f?auto=format&fit=crop&w=800&q=80"},
        {name: "Chicken Pesto Panini", price: "P58.90", desc: "Grilled chicken, pesto & mozzarella", img: "https://images.unsplash.com/photo-1509365462397-8a3c2f5a5f5f?auto=format&fit=crop&w=800&q=80"},
        {name: "Granola Bowl", price: "P38.90", desc: "Greek yogurt, fruits & honey", img: "https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=800&q=80"},
        {name: "Smoked Salmon Bagel", price: "P55.90", desc: "Cream cheese, capers & onion", img: "https://images.unsplash.com/photo-1606313565693-7f3f7b3f3f3f?auto=format&fit=crop&w=800&q=80"},
        {name: "Quiche Lorraine", price: "P48.90", desc: "Classic ham and cheese quiche", img: "https://images.unsplash.com/photo-1621996346565-e9a0f6f9e8f8?auto=format&fit=crop&w=800&q=80"}
    ]
};

function renderMenu(category, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    
    menuData[category].forEach(item => {
        const html = `
            <div class="col-md-4 col-sm-6 mb-4">
                <div class="card coffee-card border-0 text-light">
                    <img src="${item.img}" class="card-img-top" style="height: 220px; object-fit: cover;" alt="${item.name}">
                    <div class="card-body d-flex flex-column">
                        <h5>${item.name}</h5>
                        <p class="flex-grow-1">${item.desc}</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="price">${item.price}</span>
                            <button onclick="addToCart('${item.name}', '${item.price}')" class="btn add-to-cart btn-sm">Add to Cart</button>
                        </div>
                    </div>
                </div>
            </div>`;
        container.innerHTML += html;
    });
}

// Tab functionality
document.querySelectorAll('.category-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        document.querySelectorAll('.menu-category').forEach(cat => cat.classList.add('d-none'));
        document.getElementById(tab.dataset.category).classList.remove('d-none');
    });
});

// Render all categories
renderMenu('drinks', 'drinks');
renderMenu('pastries', 'pastries');
renderMenu('meals', 'meals');

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function addToCart(name, price) {
    cart.push({name, price});
    localStorage.setItem('cart', JSON.stringify(cart));
    alert(`${name} added to cart!`);
}

window.addToCart = addToCart;
</script>
</body>
</html>
