<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Your Order - Supreme Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .overlay {
      background: rgba(28,18,13,0.9);
      min-height: 100vh;
    }
    .order-form {
      background: rgba(245,230,211,0.98);
      color: #1c120d;
    }
    .cart-item { background: #f8f1e3; }
  </style>
</head>
<body>

<div class="overlay d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <!-- Cart -->
      <div class="col-lg-5 mb-4">
        <div class="order-form p-4 rounded-4 shadow">
          <h3 class="mb-4">Your Cart</h3>
          <div id="cart-items"></div>
          <hr>
          <h5>Total: <span id="cart-total" class="price fs-4">P0.00</span></h5>
        </div>
      </div>

      <!-- Order Form -->
      <div class="col-lg-7">
        <form id="orderForm" action="https://formspree.io/f/mbdwzlar" method="POST" class="order-form p-5 rounded-4 shadow">
          <h2 class="text-center mb-4">Place Your Order</h2>
          
          <div class="mb-3">
            <label class="form-label fw-bold">Full Name</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Phone Number</label>
              <input type="tel" name="phone" class="form-control" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-bold">Special Instructions / Delivery Address</label>
            <textarea name="instructions" class="form-control" rows="4"></textarea>
          </div>

          <input type="hidden" name="order_summary" id="hidden-order">

          <button type="submit" class="btn w-100 py-3 fw-bold fs-5" style="background:#e5c08b; color:#1c120d;">
            Submit Order
          </button>
          <small class="text-center d-block mt-3 text-muted">Your order will be sent to supremecoffee@gmail.com</small>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    
    function renderCart() {
        const container = document.getElementById('cart-items');
        let total = 0;
        container.innerHTML = '';
        
        cart.forEach(item => {
            const priceNum = parseFloat(item.price.replace('P',''));
            total += priceNum;
            container.innerHTML += `
                <div class="cart-item p-3 mb-2 rounded d-flex justify-content-between">
                    <span>${item.name}</span>
                    <span>${item.price}</span>
                </div>`;
        });
        
        document.getElementById('cart-total').textContent = `P${total.toFixed(2)}`;
        document.getElementById('hidden-order').value = JSON.stringify(cart, null, 2);
    }
    
    renderCart();
    
    document.getElementById('orderForm').addEventListener('submit', function() {
        setTimeout(() => {
            alert("✅ Thank you! Your order has been received.");
            localStorage.removeItem('cart');
        }, 700);
    });
</script>
</body>
</html>
