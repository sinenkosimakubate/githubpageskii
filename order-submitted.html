<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Submitted</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: url('cappuccino.jpg') no-repeat center center/cover;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 10px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      margin-bottom: 10px;
    }

    a.button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    a.button:hover {
      background: #0056b3;
    }

  </style>
</head>
<body>
  <div class="overlay">
    <h1>Thank You!</h1>
    <p>Your order has been submitted successfully.</p>
    <p>We will contact you soon at your email or phone number.</p>
    <a href="contact.html" class="button">Place Another Order</a>
  </div>
</body>
</html>
