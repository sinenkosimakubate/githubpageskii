<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Submitted — Supreme Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .confirm-area {
        min-height: calc(100vh - 73px);
        background: linear-gradient(rgba(28,18,13,0.78), rgba(28,18,13,0.88)),
                    url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=2000&q=80')
                    center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
    }
    .confirm-box {
        background: #f5ece0;
        border: 2px solid #1c120d;
        border-radius: 20px;
        padding: 70px 50px;
        text-align: center;
        max-width: 520px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .confirm-icon { 
        font-size: 4.8rem; 
        margin-bottom: 24px; 
        display: block; 
    }
    .confirm-box h1 { 
        color: #1c120d; 
        font-size: 2.5rem; 
        font-weight: 700; 
        margin-bottom: 18px; 
    }
    .confirm-box p { 
        color: #000000;           /* Pure black text */
        line-height: 1.7; 
        font-size: 1.08rem;
        margin-bottom: 12px; 
        font-weight: 500;
    }
    .confirm-btn {
        display: inline-block;
        margin-top: 30px;
        padding: 14px 40px;
        background: #1c120d;
        color: #e5c08b;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        font-size: 1.1rem;
        transition: all 0.2s;
    }
    .confirm-btn:hover { 
        background: #2b1b14; 
        transform: translateY(-3px); 
    }
    .confirm-btn-outline {
        background: transparent;
        color: #1c120d;
        border: 2px solid #1c120d;
        margin-left: 12px;
    }
    .confirm-btn-outline:hover {
        background: #1c120d;
        color: #e5c08b;
    }
  </style>
</head>
<body>

<header>
  <h1>Supreme Coffee</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="contact.html" class="cart-link">
      Order Now
      <span id="cart-badge"></span>
    </a>
  </nav>
</header>

<div class="confirm-area">
  <div class="confirm-box">
    <span class="confirm-icon">☕</span>
    <h1>Order Received!</h1>
    <p>Thank you for choosing Supreme Coffee.</p>
    <p>Your order has been submitted successfully.</p>
    <p>We'll contact you shortly via email or phone to confirm the details.</p>
    
    <div>
      <a href="contact.html" class="confirm-btn">Place Another Order</a>
      <a href="index.html" class="confirm-btn confirm-btn-outline">Back to Home</a>
    </div>
  </div>
</div>

<!-- Floating Cart Button -->
<a href="contact.html" id="floating-cart">
    🛒
    <span class="cart-count" id="floating-count">0</span>
</a>

<footer>
  <p>© Supreme Coffee 2026 • All Rights Reserved</p>
</footer>

<script>
  function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const badge = document.getElementById('cart-badge');
    const floatingCount = document.getElementById('floating-count');

    if (cart.length > 0) {
      badge.textContent = cart.length;
      badge.style.display = 'inline';
      floatingCount.textContent = cart.length;
      floatingCount.style.display = 'flex';
    } else {
      badge.style.display = 'none';
      floatingCount.style.display = 'none';
    }
  }

  updateCartBadge();
</script>
</body>
</html>
