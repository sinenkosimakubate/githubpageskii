<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Submitted — Supreme Coffee</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .confirm-area {
        min-height: calc(100vh - 73px);
        background: linear-gradient(rgba(28,18,13,0.78), rgba(28,18,13,0.88)),
                    url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=2000&q=80')
                    center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
    }
    .confirm-box {
        background: #1c120d;
        border: 1px solid rgba(229,192,139,0.18);
        border-radius: 20px;
        padding: 60px 50px;
        text-align: center;
        max-width: 480px;
        width: 100%;
    }
    .confirm-icon { font-size: 3rem; margin-bottom: 20px; display: block; }
    .confirm-box h1 { color: #e5c08b; font-size: 2rem; font-weight: 700; margin-bottom: 14px; }
    .confirm-box p { color: #c9a87a; line-height: 1.7; margin-bottom: 6px; }
    .confirm-btn {
        display: inline-block;
        margin-top: 28px;
        padding: 13px 36px;
        background: #e5c08b;
        color: #1c120d;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 700;
        transition: background 0.2s, transform 0.15s;
    }
    .confirm-btn:hover { background: #d4ad77; transform: translateY(-1px); color: #1c120d; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo-badge"><img src="Elegant_Supreme_Coffee_logo_design.png" alt="Supreme Coffee"></a>
  <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="contact.html">Order Now</a>
  </nav>
</header>

<div class="confirm-area">
  <div class="confirm-box">
    <span class="confirm-icon">☕</span>
    <h1>Order Received!</h1>
    <p>Thank you for your order. It has been submitted successfully.</p>
    <p>We'll be in touch shortly to confirm at your email or phone number.</p>
    <a href="contact.html" class="confirm-btn">Place Another Order</a>
  </div>
</div>

<footer>
  <p>© Supreme Coffee 2026 • All Rights Reserved</p>
</footer>

</body>
</html>
